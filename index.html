<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NWASCO Visitor Sign-In</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #555;
      --border: #d0d7de;
      --primary: #003865;
      --secondary: #e5e7eb;
      --notice-bg: #fff7ed;
      --notice-border: #fed7aa;
      --notice-text: #7c2d12;
      --hint-bg: #eff6ff;
      --hint-border: #bfdbfe;
      --hint-text: #1e3a8a;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --shadow: 0 12px 35px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 950px;
      min-height: 92vh;
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
      text-align: left;
      flex-shrink: 0;
    }

    .logo {
      height: 82px;
      width: auto;
      object-fit: contain;
      background: #fff;
      padding: 6px;
      border-radius: 10px;
      border: 1px solid #eef0f3;
      flex-shrink: 0;
    }

    .welcome {
      margin: 0;
      font-size: 26px;
      font-weight: 750;
      line-height: 1.12;
    }

    .subtext {
      margin-top: 6px;
      font-size: 16px;
      color: var(--muted);
    }

    .langRow {
      display: flex;
      justify-content: flex-end;
      gap: 10px;
      margin-bottom: 8px;
    }

    .langBtn {
      min-width: 120px;
      padding: 12px 18px;
      font-size: 18px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: #fff;
      cursor: pointer;
    }

    .langBtn.active {
      background: var(--primary);
      color: #fff;
      border-color: var(--primary);
      font-weight: 700;
    }

    .content {
      flex: 1;
      overflow: auto;
      padding-right: 4px;
    }

    .step { display: none; }
    .step.active { display: block; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 650;
    }

    input {
      width: 100%;
      font-size: 22px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,56,101,.12);
    }

    .cameraFrame {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 52vh;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      margin-top: 10px;
    }

    video, #preview {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .hintBox,
    .notice,
    .errorBox {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 650;
    }

    .hintBox {
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      color: var(--hint-text);
    }

    .notice {
      background: var(--notice-bg);
      border: 1px solid var(--notice-border);
      color: var(--notice-text);
    }

    .errorBox {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      display: none;
    }

    .small {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.35;
    }

    .btns {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button.actionBtn {
      border: none;
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 20px;
      cursor: pointer;
      min-width: 180px;
      user-select: none;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: var(--secondary);
      color: #111827;
    }

    .status {
      min-height: 28px;
      margin-top: 14px;
      text-align: center;
      font-size: 18px;
    }

    @media (max-width: 750px) {
      .wrap { padding: 12px; }
      .card { min-height: auto; padding: 20px; }
      .row { grid-template-columns: 1fr; }
      .logo { height: 70px; }
      .welcome { font-size: 22px; }
      .subtext { font-size: 15px; }
      button.actionBtn, .langBtn { width: 100%; }
      .btns, .langRow { gap: 12px; }
      .langRow { flex-direction: column; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <img
          class="logo"
          src="https://www.nwasco.k12.or.us/pics/school_logo.png"
          alt="North Wasco County School District logo"
        >
        <div>
          <h1 class="welcome" id="welcomeText">Welcome to North Wasco County School District</h1>
          <div class="subtext" id="subtextText">Please sign in before checking in with the front office.</div>
        </div>
      </div>

      <div class="langRow">
        <button class="langBtn active" id="langEnBtn" type="button">English</button>
        <button class="langBtn" id="langEsBtn" type="button">Español</button>
      </div>

      <div class="content">
        <div id="step1" class="step active">
          <div class="row">
            <div>
              <label for="firstName" id="firstNameLabel">First Name</label>
              <input id="firstName" autocomplete="given-name">
            </div>

            <div>
              <label for="lastName" id="lastNameLabel">Last Name</label>
              <input id="lastName" autocomplete="family-name">
            </div>
          </div>

          <div class="hintBox small" id="allowCameraText">
            When prompted, tap <strong>Allow</strong> to let this page use the camera.
          </div>

          <div class="btns">
            <button class="actionBtn primary" id="startCameraBtn" type="button">Next: Take Photo</button>
            <button class="actionBtn secondary" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="status" id="status"></div>
        </div>

        <div id="step2" class="step">
          <div class="hintBox" id="cameraHintText">
            Center your face in the frame, then tap <strong>Capture Photo</strong>.
          </div>

          <div class="cameraFrame">
            <video id="video" autoplay playsinline muted></video>
          </div>

          <div id="cameraErrorBox" class="errorBox small"></div>

          <div class="btns">
            <button class="actionBtn primary" id="captureBtn" type="button">Capture Photo</button>
            <button class="actionBtn secondary" id="backBtn" type="button">Back</button>
          </div>

          <div class="status" id="statusCam"></div>
        </div>

        <div id="step3" class="step">
          <div class="cameraFrame">
            <img id="preview" alt="Visitor photo preview">
          </div>

          <div class="notice" id="secretaryText">
            Please check in with the secretary for your ID badge.
          </div>

          <div class="btns">
            <button class="actionBtn secondary" id="retakeBtn" type="button">Retake</button>
            <button class="actionBtn primary" id="signInBtn" type="button">Sign In</button>
          </div>

          <div class="status" id="status2"></div>
        </div>
      </div>
    </div>
  </div>

  <form
    id="submitForm"
    action="https://script.google.com/macros/s/AKfycbwK8NN2n4WPj4yQrfqugJR9YYzv49TiCYqloDUgMppZ2PUduB0Se85ZI_U5FKeO5Pal/exec"
    method="POST"
    target="submitFrame"
    style="display:none;"
  >
    <input type="hidden" name="firstName" id="formFirstName">
    <input type="hidden" name="lastName" id="formLastName">
    <input type="hidden" name="photoDataUrl" id="formPhotoDataUrl">
    <input type="hidden" name="device" id="formDevice">
    <input type="hidden" name="lang" id="formLang">
  </form>

  <iframe name="submitFrame" id="submitFrame" style="display:none;"></iframe>

  <script>
    const i18n = {
      en: {
        welcome: "Welcome to North Wasco County School District",
        subtext: "Please sign in before checking in with the front office.",
        firstName: "First Name",
        lastName: "Last Name",
        allowCamera: 'When prompted, tap <strong>Allow</strong> to let this page use the camera.',
        nextPhoto: "Next: Take Photo",
        reset: "Reset",
        cameraHint: 'Center your face in the frame, then tap <strong>Capture Photo</strong>.',
        capture: "Capture Photo",
        back: "Back",
        secretary: "Please check in with the secretary for your ID badge.",
        retake: "Retake",
        signIn: "Sign In",
        enterName: "Please enter first and last name.",
        startingCamera: "Starting camera...",
        missingPhoto: "Missing photo. Please retake the picture.",
        creatingBadge: "Creating badge...",
        done: "Done. Please check in with the secretary.",
        stillWorking: "Still working... badge creation can take a little longer.",
        cameraBlocked: "Camera access was blocked. Allow camera access for this site, then reload the page.",
        noCamera: "No camera was found on this device.",
        cameraBusy: "The camera is busy or unavailable. Close any other app using the camera and try again.",
        cameraUnsupported: "This device or browser does not support camera access.",
        cameraNotReady: "Camera is not ready yet. Please try again.",
        captureFailed: "Could not capture photo.",
        responseError: "Error reading server response.",
        unknownError: "Unknown error"
      },
      es: {
        welcome: "Bienvenido al Distrito Escolar del Condado de North Wasco",
        subtext: "Por favor registrese en la oficina.",
        firstName: "Nombre",
        lastName: "Apellido",
        allowCamera: 'Cuando se le pida, toque <strong>Permitir</strong> para usar la cámara.',
        nextPhoto: "Siguiente: Tomar foto",
        reset: "Reiniciar",
        cameraHint: 'Centre su rostro en la imagen y luego toque <strong>Tomar foto</strong>.',
        capture: "Tomar foto",
        back: "Atrás",
        secretary: "Por favor pase con la secretaria para recibir su gafete.",
        retake: "Tomar otra",
        signIn: "Registrar",
        enterName: "Por favor ingrese nombre y apellido.",
        startingCamera: "Iniciando cámara...",
        missingPhoto: "Falta la foto. Vuelva a tomarla.",
        creatingBadge: "Creando gafete...",
        done: "Listo. Por favor pase con la secretaria.",
        stillWorking: "Todavía trabajando... la creación del gafete puede tardar un poco más.",
        cameraBlocked: "El acceso a la cámara fue bloqueado. Permita la cámara para este sitio y vuelva a cargar la página.",
        noCamera: "No se encontró una cámara en este dispositivo.",
        cameraBusy: "La cámara está ocupada o no disponible. Cierre otra aplicación que la esté usando e inténtelo de nuevo.",
        cameraUnsupported: "Este dispositivo o navegador no admite acceso a la cámara.",
        cameraNotReady: "La cámara todavía no está lista. Inténtelo de nuevo.",
        captureFailed: "No se pudo tomar la foto.",
        responseError: "Error al leer la respuesta del servidor.",
        unknownError: "Error desconocido"
      }
    };

    let currentLang = "en";

    function tr(key) {
      return (i18n[currentLang] && i18n[currentLang][key]) || i18n.en[key] || key;
    }

    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");
    const step3 = document.getElementById("step3");

    const firstNameEl = document.getElementById("firstName");
    const lastNameEl = document.getElementById("lastName");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");

    const statusEl = document.getElementById("status");
    const statusCamEl = document.getElementById("statusCam");
    const status2El = document.getElementById("status2");
    const cameraErrorBox = document.getElementById("cameraErrorBox");

    const startCameraBtn = document.getElementById("startCameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const backBtn = document.getElementById("backBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const signInBtn = document.getElementById("signInBtn");
    const resetBtn = document.getElementById("resetBtn");
    const submitFrame = document.getElementById("submitFrame");
    const langEnBtn = document.getElementById("langEnBtn");
    const langEsBtn = document.getElementById("langEsBtn");

    let stream = null;
    let photoDataUrl = null;
    let isSubmitting = false;
    let inactivityTimer = null;
    let submitStartedAt = 0;
    let submitTimeout = null;
    let gotServerResponse = false;

    function applyLanguage() {
      document.getElementById("welcomeText").textContent = tr("welcome");
      document.getElementById("subtextText").textContent = tr("subtext");
      document.getElementById("firstNameLabel").textContent = tr("firstName");
      document.getElementById("lastNameLabel").textContent = tr("lastName");
      document.getElementById("allowCameraText").innerHTML = tr("allowCamera");
      document.getElementById("cameraHintText").innerHTML = tr("cameraHint");
      document.getElementById("secretaryText").textContent = tr("secretary");

      startCameraBtn.textContent = tr("nextPhoto");
      resetBtn.textContent = tr("reset");
      captureBtn.textContent = tr("capture");
      backBtn.textContent = tr("back");
      retakeBtn.textContent = tr("retake");
      signInBtn.textContent = tr("signIn");

      langEnBtn.classList.toggle("active", currentLang === "en");
      langEsBtn.classList.toggle("active", currentLang === "es");
    }

    function setStatus(message) {
      const msg = message || "";
      statusEl.textContent = msg;
      statusCamEl.textContent = msg;
      status2El.textContent = msg;
    }

    function clearCameraError() {
      cameraErrorBox.style.display = "none";
      cameraErrorBox.textContent = "";
    }

    function showCameraError(message) {
      cameraErrorBox.textContent = message;
      cameraErrorBox.style.display = "block";
    }

    function showStep(stepNumber) {
      step1.classList.toggle("active", stepNumber === 1);
      step2.classList.toggle("active", stepNumber === 2);
      step3.classList.toggle("active", stepNumber === 3);

      if (stepNumber === 1) {
        clearCameraError();
        firstNameEl.focus();
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        location.reload();
      }, 120000);
    }

    function validateNames() {
      const first = firstNameEl.value.trim();
      const last = lastNameEl.value.trim();

      if (!first || !last) {
        setStatus(tr("enterName"));
        return null;
      }

      return { first, last };
    }

    async function startCamera() {
      setStatus(tr("startingCamera"));
      clearCameraError();
      stopCamera();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        const msg = tr("cameraUnsupported");
        setStatus(msg);
        showCameraError(msg);
        throw new Error(msg);
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        setStatus("");
      } catch (e) {
        let friendly = tr("cameraUnsupported");

        if (e.name === "NotAllowedError") {
          friendly = tr("cameraBlocked");
        } else if (e.name === "NotFoundError") {
          friendly = tr("noCamera");
        } else if (e.name === "NotReadableError") {
          friendly = tr("cameraBusy");
        } else if (e.message) {
          friendly = e.message;
        }

        setStatus(friendly);
        showCameraError(friendly);
        throw e;
      }
    }

    function captureAndResizeDataUrl(quality = 0.72, maxWidth = 700) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;

      if (!sourceWidth || !sourceHeight) {
        throw new Error(tr("cameraNotReady"));
      }

      const scale = Math.min(1, maxWidth / sourceWidth);
      const width = Math.round(sourceWidth * scale);
      const height = Math.round(sourceHeight * scale);

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      return canvas.toDataURL("image/jpeg", quality);
    }

    function finishSuccess() {
      clearTimeout(submitTimeout);
      gotServerResponse = true;
      setStatus(tr("done"));
      setTimeout(() => {
        location.reload();
      }, 1500);
    }

    function finishError(message) {
      clearTimeout(submitTimeout);
      gotServerResponse = true;
      setStatus("Error: " + (message || tr("unknownError")));
      isSubmitting = false;
      signInBtn.disabled = false;
      retakeBtn.disabled = false;
    }

    function submitVisit() {
      const names = validateNames();
      if (!names) return;

      if (!photoDataUrl) {
        setStatus(tr("missingPhoto"));
        return;
      }

      if (isSubmitting) return;

      isSubmitting = true;
      gotServerResponse = false;
      submitStartedAt = Date.now();

      signInBtn.disabled = true;
      retakeBtn.disabled = true;

      setStatus(tr("creatingBadge"));

      document.getElementById("formFirstName").value = names.first;
      document.getElementById("formLastName").value = names.last;
      document.getElementById("formPhotoDataUrl").value = photoDataUrl;
      document.getElementById("formDevice").value = navigator.userAgent;
      document.getElementById("formLang").value = currentLang;

      clearTimeout(submitTimeout);
      submitTimeout = setTimeout(() => {
        if (!gotServerResponse) {
          setStatus(tr("stillWorking"));
        }
      }, 8000);

      document.getElementById("submitForm").submit();
    }

    function handleServerResponse(data) {
      if (data.ok) {
        finishSuccess();
      } else {
        finishError(data.error);
      }
    }

    window.addEventListener("message", (event) => {
      try {
        const data = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
        if (!data || typeof data.ok === "undefined") return;
        handleServerResponse(data);
      } catch (err) {
        finishError(tr("responseError"));
      }
    });

    submitFrame.addEventListener("load", () => {
      if (!isSubmitting || gotServerResponse) return;
      if (Date.now() - submitStartedAt < 1200) return;
      finishSuccess();
    });

    async function handleStartCamera() {
      const names = validateNames();
      if (!names) return;

      startCameraBtn.disabled = true;

      try {
        await startCamera();
        showStep(2);
      } catch (e) {
      } finally {
        startCameraBtn.disabled = false;
      }
    }

    function handleCapture() {
      try {
        photoDataUrl = captureAndResizeDataUrl();
        preview.src = photoDataUrl;
        stopCamera();
        setStatus("");
        showStep(3);
      } catch (e) {
        setStatus(e.message || tr("captureFailed"));
      }
    }

    async function handleRetake() {
      retakeBtn.disabled = true;
      signInBtn.disabled = true;

      try {
        await startCamera();
        showStep(2);
      } catch (e) {
      } finally {
        retakeBtn.disabled = false;
        signInBtn.disabled = false;
      }
    }

    function handleBack() {
      stopCamera();
      setStatus("");
      clearCameraError();
      showStep(1);
    }

    function handleReset() {
      location.reload();
    }

    startCameraBtn.addEventListener("click", handleStartCamera);
    captureBtn.addEventListener("click", handleCapture);
    backBtn.addEventListener("click", handleBack);
    retakeBtn.addEventListener("click", handleRetake);
    signInBtn.addEventListener("click", submitVisit);
    resetBtn.addEventListener("click", handleReset);

    langEnBtn.addEventListener("click", () => {
      currentLang = "en";
      applyLanguage();
    });

    langEsBtn.addEventListener("click", () => {
      currentLang = "es";
      applyLanguage();
    });

    [firstNameEl, lastNameEl].forEach(el => {
      el.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          handleStartCamera();
        }
      });
    });

    ["click", "touchstart", "keydown", "mousemove"].forEach(eventName => {
      document.addEventListener(eventName, resetInactivityTimer, { passive: true });
    });

    window.addEventListener("beforeunload", stopCamera);

    applyLanguage();
    showStep(1);
    resetInactivityTimer();
  </script>
</body>
</html>
