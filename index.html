<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NWASCO Visitor Sign-In</title>

  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #555;
      --border: #d0d7de;
      --primary: #003865;
      --secondary: #e5e7eb;
      --notice-bg: #fff7ed;
      --notice-border: #fed7aa;
      --notice-text: #7c2d12;
      --hint-bg: #eff6ff;
      --hint-border: #bfdbfe;
      --hint-text: #1e3a8a;
      --error-bg: #fef2f2;
      --error-border: #fecaca;
      --error-text: #991b1b;
      --shadow: 0 12px 35px rgba(0,0,0,.08);
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 950px;
      min-height: 92vh;
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
      text-align: left;
      flex-shrink: 0;
    }

    .logo {
      height: 82px;
      width: auto;
      object-fit: contain;
      background: #fff;
      padding: 6px;
      border-radius: 10px;
      border: 1px solid #eef0f3;
      flex-shrink: 0;
    }

    .welcome {
      margin: 0;
      font-size: 26px;
      font-weight: 750;
      line-height: 1.12;
    }

    .subtext {
      margin-top: 6px;
      font-size: 16px;
      color: var(--muted);
    }

    .content {
      flex: 1;
      overflow: auto;
      padding-right: 4px;
    }

    .step {
      display: none;
    }

    .step.active {
      display: block;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 650;
    }

    input {
      width: 100%;
      font-size: 22px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
      background: #fff;
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(0,56,101,.12);
    }

    .cameraFrame {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 52vh;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      margin-top: 10px;
    }

    video, #preview {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .hintBox,
    .notice,
    .errorBox {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 650;
    }

    .hintBox {
      background: var(--hint-bg);
      border: 1px solid var(--hint-border);
      color: var(--hint-text);
    }

    .notice {
      background: var(--notice-bg);
      border: 1px solid var(--notice-border);
      color: var(--notice-text);
    }

    .errorBox {
      background: var(--error-bg);
      border: 1px solid var(--error-border);
      color: var(--error-text);
      display: none;
    }

    .small {
      font-size: 15px;
      font-weight: 500;
      line-height: 1.35;
    }

    .btns {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 20px;
      cursor: pointer;
      min-width: 180px;
      user-select: none;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .primary {
      background: var(--primary);
      color: #fff;
    }

    .secondary {
      background: var(--secondary);
      color: #111827;
    }

    .status {
      min-height: 28px;
      margin-top: 14px;
      text-align: center;
      font-size: 18px;
    }

    @media (max-width: 750px) {
      .wrap {
        padding: 12px;
      }

      .card {
        min-height: auto;
        padding: 20px;
      }

      .row {
        grid-template-columns: 1fr;
      }

      .logo {
        height: 70px;
      }

      .welcome {
        font-size: 22px;
      }

      .subtext {
        font-size: 15px;
      }

      button {
        width: 100%;
      }

      .btns {
        gap: 12px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <img
          class="logo"
          src="https://www.nwasco.k12.or.us/pics/school_logo.png"
          alt="North Wasco County School District logo"
        >
        <div>
          <h1 class="welcome">Welcome to North Wasco County School District</h1>
          <div class="subtext">Please sign in before checking in with the front office.</div>
        </div>
      </div>

      <div class="content">
        <div id="step1" class="step active">
          <div class="row">
            <div>
              <label for="firstName">First Name</label>
              <input id="firstName" autocomplete="given-name">
            </div>

            <div>
              <label for="lastName">Last Name</label>
              <input id="lastName" autocomplete="family-name">
            </div>
          </div>

          <div class="hintBox small">
            When prompted, tap <strong>Allow</strong> to let this page use the camera.
          </div>

          <div class="btns">
            <button class="primary" id="startCameraBtn" type="button">Next: Take Photo</button>
            <button class="secondary" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="status" id="status"></div>
        </div>

        <div id="step2" class="step">
          <div class="hintBox">
            Center your face in the frame, then tap <strong>Capture Photo</strong>.
          </div>

          <div class="cameraFrame">
            <video id="video" autoplay playsinline muted></video>
          </div>

          <div id="cameraErrorBox" class="errorBox small"></div>

          <div class="btns">
            <button class="primary" id="captureBtn" type="button">Capture Photo</button>
            <button class="secondary" id="backBtn" type="button">Back</button>
          </div>

          <div class="status" id="statusCam"></div>
        </div>

        <div id="step3" class="step">
          <div class="cameraFrame">
            <img id="preview" alt="Visitor photo preview">
          </div>

          <div class="notice">
            Please check in with the secretary for your ID badge.
          </div>

          <div class="btns">
            <button class="secondary" id="retakeBtn" type="button">Retake</button>
            <button class="primary" id="signInBtn" type="button">Sign In</button>
          </div>

          <div class="status" id="status2"></div>
        </div>
      </div>
    </div>
  </div>

  <form
    id="submitForm"
    action="https://script.google.com/macros/s/AKfycbwK8NN2n4WPj4yQrfqugJR9YYzv49TiCYqloDUgMppZ2PUduB0Se85ZI_U5FKeO5Pal/exec"
    method="POST"
    target="submitFrame"
    style="display:none;"
  >
    <input type="hidden" name="firstName" id="formFirstName">
    <input type="hidden" name="lastName" id="formLastName">
    <input type="hidden" name="photoDataUrl" id="formPhotoDataUrl">
    <input type="hidden" name="device" id="formDevice">
  </form>

  <iframe name="submitFrame" id="submitFrame" style="display:none;"></iframe>

  <script>
    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");
    const step3 = document.getElementById("step3");

    const firstNameEl = document.getElementById("firstName");
    const lastNameEl = document.getElementById("lastName");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");

    const statusEl = document.getElementById("status");
    const statusCamEl = document.getElementById("statusCam");
    const status2El = document.getElementById("status2");
    const cameraErrorBox = document.getElementById("cameraErrorBox");

    const startCameraBtn = document.getElementById("startCameraBtn");
    const captureBtn = document.getElementById("captureBtn");
    const backBtn = document.getElementById("backBtn");
    const retakeBtn = document.getElementById("retakeBtn");
    const signInBtn = document.getElementById("signInBtn");
    const resetBtn = document.getElementById("resetBtn");

    let stream = null;
    let photoDataUrl = null;
    let isSubmitting = false;
    let inactivityTimer = null;

    function setStatus(message) {
      const msg = message || "";
      statusEl.textContent = msg;
      statusCamEl.textContent = msg;
      status2El.textContent = msg;
    }

    function clearCameraError() {
      cameraErrorBox.style.display = "none";
      cameraErrorBox.textContent = "";
    }

    function showCameraError(message) {
      cameraErrorBox.textContent = message;
      cameraErrorBox.style.display = "block";
    }

    function showStep(stepNumber) {
      step1.classList.toggle("active", stepNumber === 1);
      step2.classList.toggle("active", stepNumber === 2);
      step3.classList.toggle("active", stepNumber === 3);

      if (stepNumber === 1) {
        clearCameraError();
        firstNameEl.focus();
      }
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(track => track.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        location.reload();
      }, 120000);
    }

    function validateNames() {
      const first = firstNameEl.value.trim();
      const last = lastNameEl.value.trim();

      if (!first || !last) {
        setStatus("Please enter first and last name.");
        return null;
      }

      return { first, last };
    }

    async function startCamera() {
      setStatus("Starting camera...");
      clearCameraError();
      stopCamera();

      if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
        const msg = "This device or browser does not support camera access.";
        setStatus(msg);
        showCameraError(msg);
        throw new Error(msg);
      }

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        setStatus("");
      } catch (e) {
        let friendly = "Camera error.";

        if (e.name === "NotAllowedError") {
          friendly = "Camera access was blocked. Allow camera access for this site, then reload the page.";
        } else if (e.name === "NotFoundError") {
          friendly = "No camera was found on this device.";
        } else if (e.name === "NotReadableError") {
          friendly = "The camera is busy or unavailable. Close any other app using the camera and try again.";
        } else if (e.message) {
          friendly = e.message;
        }

        setStatus(friendly);
        showCameraError(friendly);
        throw e;
      }
    }

    function captureAndResizeDataUrl(quality = 0.82, maxWidth = 900) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;

      if (!sourceWidth || !sourceHeight) {
        throw new Error("Camera is not ready yet. Please try again.");
      }

      const scale = Math.min(1, maxWidth / sourceWidth);
      const width = Math.round(sourceWidth * scale);
      const height = Math.round(sourceHeight * scale);

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      return canvas.toDataURL("image/jpeg", quality);
    }

    function submitVisit() {
      const names = validateNames();
      if (!names) return;

      if (!photoDataUrl) {
        setStatus("Missing photo. Please retake the picture.");
        return;
      }

      if (isSubmitting) return;

      isSubmitting = true;
      signInBtn.disabled = true;
      retakeBtn.disabled = true;

      setStatus("Creating badge...");

      document.getElementById("formFirstName").value = names.first;
      document.getElementById("formLastName").value = names.last;
      document.getElementById("formPhotoDataUrl").value = photoDataUrl;
      document.getElementById("formDevice").value = navigator.userAgent;

      document.getElementById("submitForm").submit();
    }

    function handleServerResponse(data) {
      if (data.ok) {
        setStatus("Done. Please check in with the secretary.");
        setTimeout(() => {
          location.reload();
        }, 1500);
      } else {
        setStatus("Error: " + (data.error || "Unknown error"));
        isSubmitting = false;
        signInBtn.disabled = false;
        retakeBtn.disabled = false;
      }
    }

    window.addEventListener("message", (event) => {
      try {
        const data = typeof event.data === "string" ? JSON.parse(event.data) : event.data;
        if (!data || typeof data.ok === "undefined") return;
        handleServerResponse(data);
      } catch (err) {
        setStatus("Error reading server response.");
        isSubmitting = false;
        signInBtn.disabled = false;
        retakeBtn.disabled = false;
      }
    });

    async function handleStartCamera() {
      const names = validateNames();
      if (!names) return;

      startCameraBtn.disabled = true;

      try {
        await startCamera();
        showStep(2);
      } catch (e) {
        // message already shown
      } finally {
        startCameraBtn.disabled = false;
      }
    }

    function handleCapture() {
      try {
        photoDataUrl = captureAndResizeDataUrl();
        preview.src = photoDataUrl;
        stopCamera();
        setStatus("");
        showStep(3);
      } catch (e) {
        setStatus(e.message || "Could not capture photo.");
      }
    }

    async function handleRetake() {
      retakeBtn.disabled = true;
      signInBtn.disabled = true;

      try {
        await startCamera();
        showStep(2);
      } catch (e) {
        // message already shown
      } finally {
        retakeBtn.disabled = false;
        signInBtn.disabled = false;
      }
    }

    function handleBack() {
      stopCamera();
      setStatus("");
      clearCameraError();
      showStep(1);
    }

    function handleReset() {
      location.reload();
    }

    startCameraBtn.addEventListener("click", handleStartCamera);
    captureBtn.addEventListener("click", handleCapture);
    backBtn.addEventListener("click", handleBack);
    retakeBtn.addEventListener("click", handleRetake);
    signInBtn.addEventListener("click", submitVisit);
    resetBtn.addEventListener("click", handleReset);

    [firstNameEl, lastNameEl].forEach(el => {
      el.addEventListener("keydown", event => {
        if (event.key === "Enter") {
          event.preventDefault();
          handleStartCamera();
        }
      });
    });

    ["click", "touchstart", "keydown", "mousemove"].forEach(eventName => {
      document.addEventListener(eventName, resetInactivityTimer, { passive: true });
    });

    window.addEventListener("beforeunload", stopCamera);

    showStep(1);
    resetInactivityTimer();
  </script>
</body>
</html>
