<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>NWASCO Visitor Sign-In</title>
  <style>
    :root {
      --bg: #f3f4f6;
      --card: #ffffff;
      --text: #111827;
      --muted: #555;
      --border: #d0d7de;
      --primary: #003865;
      --secondary: #e5e7eb;
      --notice-bg: #fff7ed;
      --notice-border: #fed7aa;
      --notice-text: #7c2d12;
      --shadow: 0 12px 35px rgba(0,0,0,.08);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      font-family: system-ui, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .card {
      width: 100%;
      max-width: 950px;
      min-height: 92vh;
      background: var(--card);
      border-radius: 20px;
      padding: 28px;
      box-shadow: var(--shadow);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .logo {
      height: 82px;
      width: auto;
      object-fit: contain;
      background: #fff;
      padding: 6px;
      border-radius: 10px;
      border: 1px solid #eef0f3;
    }

    .welcome {
      margin: 0;
      font-size: 26px;
      font-weight: 750;
      line-height: 1.12;
    }

    .subtext {
      margin-top: 6px;
      font-size: 16px;
      color: var(--muted);
    }

    .content {
      flex: 1;
      overflow: auto;
    }

    .step { display: none; }
    .step.active { display: block; }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 22px;
      margin-top: 22px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
      font-weight: 650;
    }

    input {
      width: 100%;
      font-size: 22px;
      padding: 16px;
      border-radius: 14px;
      border: 1px solid var(--border);
      outline: none;
    }

    .cameraFrame {
      width: 100%;
      aspect-ratio: 16 / 9;
      max-height: 52vh;
      border-radius: 18px;
      overflow: hidden;
      background: #000;
      margin-top: 10px;
    }

    video, img {
      display: block;
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    .hint, .notice {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 14px;
      text-align: center;
      font-size: 18px;
      font-weight: 650;
    }

    .hint {
      background: #eff6ff;
      border: 1px solid #bfdbfe;
      color: #1e3a8a;
    }

    .notice {
      background: var(--notice-bg);
      border: 1px solid var(--notice-border);
      color: var(--notice-text);
    }

    .btns {
      display: flex;
      justify-content: center;
      gap: 16px;
      margin-top: 18px;
      flex-wrap: wrap;
    }

    button {
      border: none;
      border-radius: 14px;
      padding: 16px 28px;
      font-size: 20px;
      cursor: pointer;
      min-width: 180px;
    }

    button:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .primary { background: var(--primary); color: #fff; }
    .secondary { background: var(--secondary); color: #111827; }

    .status {
      min-height: 28px;
      margin-top: 14px;
      text-align: center;
      font-size: 18px;
    }

    @media (max-width: 750px) {
      .row { grid-template-columns: 1fr; }
      button { width: 100%; }
      .logo { height: 70px; }
      .welcome { font-size: 22px; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <div class="header">
        <img class="logo" src="https://www.nwasco.k12.or.us/pics/school_logo.png" alt="NWASCO logo">
        <div>
          <h1 class="welcome">Welcome to North Wasco County School District</h1>
          <div class="subtext">Please sign in before checking in with the front office.</div>
        </div>
      </div>

      <div class="content">
        <div id="step1" class="step active">
          <div class="row">
            <div>
              <label for="firstName">First Name</label>
              <input id="firstName" autocomplete="given-name">
            </div>
            <div>
              <label for="lastName">Last Name</label>
              <input id="lastName" autocomplete="family-name">
            </div>
          </div>

          <div class="hint">When Chrome asks for camera access, tap <strong>Allow</strong>.</div>

          <div class="btns">
            <button class="primary" id="startCameraBtn" type="button">Next: Take Photo</button>
            <button class="secondary" id="resetBtn" type="button">Reset</button>
          </div>

          <div class="status" id="status"></div>
        </div>

        <div id="step2" class="step">
          <div class="hint">Center your face in the frame, then tap <strong>Capture Photo</strong>.</div>

          <div class="cameraFrame">
            <video id="video" autoplay playsinline muted></video>
          </div>

          <div class="btns">
            <button class="primary" id="captureBtn" type="button">Capture Photo</button>
            <button class="secondary" id="backBtn" type="button">Back</button>
          </div>

          <div class="status" id="statusCam"></div>
        </div>

        <div id="step3" class="step">
          <div class="cameraFrame">
            <img id="preview" alt="Preview">
          </div>

          <div class="notice">Please check in with the secretary for your ID badge.</div>

          <div class="btns">
            <button class="secondary" id="retakeBtn" type="button">Retake</button>
            <button class="primary" id="signInBtn" type="button">Sign In</button>
          </div>

          <div class="status" id="status2"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwK8NN2n4WPj4yQrfqugJR9YYzv49TiCYqloDUgMppZ2PUduB0Se85ZI_U5FKeO5Pal/exec";

    const step1 = document.getElementById("step1");
    const step2 = document.getElementById("step2");
    const step3 = document.getElementById("step3");

    const firstNameEl = document.getElementById("firstName");
    const lastNameEl = document.getElementById("lastName");
    const video = document.getElementById("video");
    const preview = document.getElementById("preview");

    let stream = null;
    let photoDataUrl = null;
    let isSubmitting = false;
    let inactivityTimer = null;

    function setStatus(msg) {
      document.getElementById("status").textContent = msg || "";
      document.getElementById("statusCam").textContent = msg || "";
      document.getElementById("status2").textContent = msg || "";
    }

    function showStep(n) {
      step1.classList.toggle("active", n === 1);
      step2.classList.toggle("active", n === 2);
      step3.classList.toggle("active", n === 3);
    }

    function stopCamera() {
      if (stream) {
        stream.getTracks().forEach(t => t.stop());
        stream = null;
      }
      video.srcObject = null;
    }

    function validateNames() {
      const first = firstNameEl.value.trim();
      const last = lastNameEl.value.trim();

      if (!first || !last) {
        setStatus("Please enter first and last name.");
        return null;
      }

      return { first, last };
    }

    async function startCamera() {
      setStatus("Starting camera...");
      stopCamera();

      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: { ideal: "environment" },
            width: { ideal: 1280 },
            height: { ideal: 720 }
          },
          audio: false
        });

        video.srcObject = stream;
        await video.play();
        setStatus("");
      } catch (e) {
        if (e.name === "NotAllowedError") {
          setStatus("Camera blocked. Allow camera access in Chrome and reload.");
        } else if (e.name === "NotFoundError") {
          setStatus("No camera was found on this device.");
        } else {
          setStatus(`Camera error: ${e.name || "Error"}`);
        }
        throw e;
      }
    }

    function captureAndResizeDataUrl(quality = 0.82, maxWidth = 900) {
      const sourceWidth = video.videoWidth;
      const sourceHeight = video.videoHeight;

      if (!sourceWidth || !sourceHeight) {
        throw new Error("Camera is not ready yet.");
      }

      const scale = Math.min(1, maxWidth / sourceWidth);
      const width = Math.round(sourceWidth * scale);
      const height = Math.round(sourceHeight * scale);

      const canvas = document.createElement("canvas");
      canvas.width = width;
      canvas.height = height;

      const ctx = canvas.getContext("2d");
      ctx.drawImage(video, 0, 0, width, height);

      return canvas.toDataURL("image/jpeg", quality);
    }

    async function submitVisit() {
      const names = validateNames();
      if (!names) return;

      if (!photoDataUrl) {
        setStatus("Missing photo. Please retake.");
        return;
      }

      if (isSubmitting) return;
      isSubmitting = true;

      document.getElementById("signInBtn").disabled = true;
      document.getElementById("retakeBtn").disabled = true;

      setStatus("Creating badge...");

      try {
        const res = await fetch(WEB_APP_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            firstName: names.first,
            lastName: names.last,
            photoDataUrl,
            device: navigator.userAgent
          })
        });

        const data = await res.json();

        if (!data.ok) {
          throw new Error(data.error || "Unknown error");
        }

        setStatus("Done. Please check in with the secretary.");
        setTimeout(() => location.reload(), 1500);

      } catch (err) {
        setStatus("Error: " + (err.message || err));
        isSubmitting = false;
        document.getElementById("signInBtn").disabled = false;
        document.getElementById("retakeBtn").disabled = false;
      }
    }

    function resetInactivityTimer() {
      clearTimeout(inactivityTimer);
      inactivityTimer = setTimeout(() => {
        location.reload();
      }, 120000);
    }

    document.getElementById("startCameraBtn").addEventListener("click", async () => {
      const names = validateNames();
      if (!names) return;

      try {
        await startCamera();
        showStep(2);
      } catch (_) {}
    });

    document.getElementById("captureBtn").addEventListener("click", () => {
      try {
        photoDataUrl = captureAndResizeDataUrl();
        preview.src = photoDataUrl;
        stopCamera();
        showStep(3);
        setStatus("");
      } catch (e) {
        setStatus("Could not capture photo.");
      }
    });

    document.getElementById("backBtn").addEventListener("click", () => {
      stopCamera();
      showStep(1);
      setStatus("");
    });

    document.getElementById("retakeBtn").addEventListener("click", async () => {
      try {
        await startCamera();
        showStep(2);
      } catch (_) {}
    });

    document.getElementById("signInBtn").addEventListener("click", submitVisit);
    document.getElementById("resetBtn").addEventListener("click", () => location.reload());

    [firstNameEl, lastNameEl].forEach(el => {
      el.addEventListener("keydown", e => {
        if (e.key === "Enter") {
          e.preventDefault();
          document.getElementById("startCameraBtn").click();
        }
      });
    });

    ["click", "touchstart", "keydown", "mousemove"].forEach(evt => {
      document.addEventListener(evt, resetInactivityTimer, { passive: true });
    });

    window.addEventListener("beforeunload", stopCamera);

    showStep(1);
    firstNameEl.focus();
    resetInactivityTimer();
  </script>
</body>
</html>
